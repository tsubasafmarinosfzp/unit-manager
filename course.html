<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>授業詳細</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <button class="btn-back" onclick="history.back()">← 戻る</button>
      <span class="app-logo" id="course-title">授業詳細</span>
      <div style="width:60px"></div>
    </div>
  </header>

  <main class="app-main">

    <!-- 授業基本情報 -->
    <section class="detail-section">
      <div class="detail-info-grid" id="course-info"></div>
      <button class="btn-complete" id="btn-complete" onclick="toggleComplete()">単位を取得済みにする</button>
    </section>

    <!-- 評価方法 -->
    <section class="detail-section">
      <div class="section-header">
        <h2 class="section-title">評価方法</h2>
        <button class="btn-edit-small" id="btn-edit-eval">編集</button>
      </div>
      <div id="eval-display"></div>
      <div id="eval-form" style="display:none">
        <div id="eval-items"></div>
        <button class="btn-add-small" id="btn-add-eval-item">＋ 項目を追加</button>
        <div class="eval-total">合計: <span id="eval-total">0</span>%</div>
        <button class="btn-submit-small" id="btn-save-eval">保存</button>
      </div>
    </section>

    <!-- 出席記録 -->
    <section class="detail-section">
      <div class="section-header">
        <h2 class="section-title">出席記録</h2>
        <div class="attendance-counts">
          <span class="att-present">出席 <strong id="att-present-count">0</strong>回</span>
          <span class="att-absent">欠席 <strong id="att-absent-count">0</strong>回</span>
        </div>
      </div>
      <div id="attendance-list"></div>
      <button class="btn-add-small" id="btn-add-attendance">＋ 出席を記録</button>
    </section>

    <!-- 課題一覧 -->
    <section class="detail-section">
      <div class="section-header">
        <h2 class="section-title">課題</h2>
        <button class="btn-add-small" id="btn-add-task-detail">＋ 課題を追加</button>
      </div>
      <div id="course-task-list"></div>
    </section>

    <!-- 回別メモ -->
    <section class="detail-section">
      <div class="section-header">
        <h2 class="section-title">回別メモ</h2>
        <button class="btn-add-small" id="btn-add-session">＋ 回を追加</button>
      </div>
      <div id="session-list"></div>
    </section>

    <!-- フリーメモ -->
    <section class="detail-section">
      <div class="section-header">
        <h2 class="section-title">フリーメモ</h2>
        <button class="btn-add-small" id="btn-add-free-note">＋ メモを追加</button>
      </div>
      <div id="free-note-list"></div>
    </section>

  <!-- 削除ボタン -->
  <div style="padding:0 16px 32px">
    <button onclick="deleteCourseAndGoBack()" style="width:100%;padding:12px;background:transparent;border:1.5px solid #E24B4A;border-radius:10px;color:#E24B4A;font-size:14px;font-weight:600;cursor:pointer;">この授業を削除する</button>
  </div>

  </main>

  <!-- 出席追加モーダル -->
  <div class="modal-overlay" id="modal-attendance" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">出席を記録</h2>
        <button class="modal-close" id="modal-att-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">日付</label>
          <input type="date" id="input-att-date" class="form-input">
        </div>
        <div class="form-row">
          <label class="form-label">状況</label>
          <select id="input-att-status" class="form-input">
            <option value="present">出席</option>
            <option value="absent">欠席</option>
          </select>
        </div>
        <button class="btn-submit" id="btn-submit-attendance">記録する</button>
      </div>
    </div>
  </div>

  <!-- 課題追加モーダル -->
  <div class="modal-overlay" id="modal-task-detail" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">課題を追加</h2>
        <button class="modal-close" id="modal-task-detail-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">課題名</label>
          <input type="text" id="input-detail-task-title" class="form-input" placeholder="例：第2章レポート">
        </div>
        <div class="form-row">
          <label class="form-label">種別</label>
          <select id="input-detail-task-type" class="form-input">
            <option value="report">レポート</option>
            <option value="quiz">小テスト</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="form-row two-col">
          <div>
            <label class="form-label">締切日</label>
            <input type="date" id="input-detail-task-deadline" class="form-input">
          </div>
          <div>
            <label class="form-label">やる予定日</label>
            <input type="date" id="input-detail-task-planned" class="form-input">
          </div>
        </div>
        <button class="btn-submit" id="btn-submit-detail-task">追加する</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="course.js"></script>
</body>
</html>
