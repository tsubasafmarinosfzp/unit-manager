<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単位管理ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <span class="app-logo">📚 単位管理</span>
      <div class="header-controls">
        <select id="year-select" class="select-pill">
          <option value="2026">2026年度</option>
          <option value="2025">2025年度</option>
        </select>
        <div class="semester-toggle">
          <label class="sem-label">
            <input type="radio" name="semester" value="spring" checked>
            <span>春学期</span>
          </label>
          <label class="sem-label">
            <input type="radio" name="semester" value="fall">
            <span>秋学期</span>
          </label>
        </div>
      </div>
    </div>
  </header>

  <main class="app-main">

    <!-- ダッシュボードバー -->
    <section class="dashboard-bar">
      <div class="dash-card">
        <span class="dash-count" id="report-count">0</span>
        <span class="dash-label">未提出レポート</span>
      </div>
      <div class="dash-card">
        <span class="dash-count" id="quiz-count">0</span>
        <span class="dash-label">未解答小テスト</span>
      </div>
      <div class="dash-card">
        <span class="dash-count" id="credit-count">0</span>
        <span class="dash-label">取得単位</span>
      </div>
    </section>

    <!-- 課題一覧 -->
    <section class="task-section">
      <div class="section-header">
        <h2 class="section-title">課題一覧</h2>
        <button class="btn-add-task" id="btn-add-task">＋ 課題を追加</button>
      </div>
      <div id="task-list"></div>
    </section>

    <!-- 時間割グリッド -->
    <section class="timetable-section">
      <div class="timetable-wrapper">
        <div class="timetable-grid">
          <div class="cell-corner"></div>
          <div class="cell-day">月</div>
          <div class="cell-day">火</div>
          <div class="cell-day">水</div>
          <div class="cell-day">木</div>
          <div class="cell-day">金</div>
          <div class="cell-day">土</div>

          <div class="cell-period">1限<span class="period-time">9:00</span></div>
          <div class="cell course-slot" data-day="mon" data-period="1"></div>
          <div class="cell course-slot" data-day="tue" data-period="1"></div>
          <div class="cell course-slot" data-day="wed" data-period="1"></div>
          <div class="cell course-slot" data-day="thu" data-period="1"></div>
          <div class="cell course-slot" data-day="fri" data-period="1"></div>
          <div class="cell course-slot" data-day="sat" data-period="1"></div>

          <div class="cell-period">2限<span class="period-time">10:50</span></div>
          <div class="cell course-slot" data-day="mon" data-period="2"></div>
          <div class="cell course-slot" data-day="tue" data-period="2"></div>
          <div class="cell course-slot" data-day="wed" data-period="2"></div>
          <div class="cell course-slot" data-day="thu" data-period="2"></div>
          <div class="cell course-slot" data-day="fri" data-period="2"></div>
          <div class="cell course-slot" data-day="sat" data-period="2"></div>

          <div class="cell-period">3限<span class="period-time">12:30</span></div>
          <div class="cell course-slot" data-day="mon" data-period="3"></div>
          <div class="cell course-slot" data-day="tue" data-period="3"></div>
          <div class="cell course-slot" data-day="wed" data-period="3"></div>
          <div class="cell course-slot" data-day="thu" data-period="3"></div>
          <div class="cell course-slot" data-day="fri" data-period="3"></div>
          <div class="cell course-slot" data-day="sat" data-period="3"></div>

          <div class="cell-period">4限<span class="period-time">14:20</span></div>
          <div class="cell course-slot" data-day="mon" data-period="4"></div>
          <div class="cell course-slot" data-day="tue" data-period="4"></div>
          <div class="cell course-slot" data-day="wed" data-period="4"></div>
          <div class="cell course-slot" data-day="thu" data-period="4"></div>
          <div class="cell course-slot" data-day="fri" data-period="4"></div>
          <div class="cell course-slot" data-day="sat" data-period="4"></div>

          <div class="cell-period">5限<span class="period-time">16:10</span></div>
          <div class="cell course-slot" data-day="mon" data-period="5"></div>
          <div class="cell course-slot" data-day="tue" data-period="5"></div>
          <div class="cell course-slot" data-day="wed" data-period="5"></div>
          <div class="cell course-slot" data-day="thu" data-period="5"></div>
          <div class="cell course-slot" data-day="fri" data-period="5"></div>
          <div class="cell course-slot" data-day="sat" data-period="5"></div>

          <div class="cell-period">6限<span class="period-time">18:00</span></div>
          <div class="cell course-slot" data-day="mon" data-period="6"></div>
          <div class="cell course-slot" data-day="tue" data-period="6"></div>
          <div class="cell course-slot" data-day="wed" data-period="6"></div>
          <div class="cell course-slot" data-day="thu" data-period="6"></div>
          <div class="cell course-slot" data-day="fri" data-period="6"></div>
          <div class="cell course-slot" data-day="sat" data-period="6"></div>

          <div class="cell-period">7限<span class="period-time">19:50</span></div>
          <div class="cell course-slot" data-day="mon" data-period="7"></div>
          <div class="cell course-slot" data-day="tue" data-period="7"></div>
          <div class="cell course-slot" data-day="wed" data-period="7"></div>
          <div class="cell course-slot" data-day="thu" data-period="7"></div>
          <div class="cell course-slot" data-day="fri" data-period="7"></div>
          <div class="cell course-slot" data-day="sat" data-period="7"></div>
        </div>
      </div>
      <button class="btn-add-course" id="btn-add-course">＋ 授業を追加</button>
    </section>

  </main>

  <!-- 授業追加モーダル -->
  <div class="modal-overlay" id="modal-add-course" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">授業を追加</h2>
        <button class="modal-close" id="modal-course-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">科目名</label>
          <input type="text" id="input-name" class="form-input" placeholder="例：経営社会学">
        </div>
        <div class="form-row two-col">
          <div>
            <label class="form-label">曜日</label>
            <select id="input-day" class="form-input">
              <option value="mon">月</option>
              <option value="tue">火</option>
              <option value="wed">水</option>
              <option value="thu">木</option>
              <option value="fri">金</option>
              <option value="sat">土</option>
            </select>
          </div>
          <div>
            <label class="form-label">時限</label>
            <select id="input-period" class="form-input">
              <option value="1">1限</option>
              <option value="2">2限</option>
              <option value="3">3限</option>
              <option value="4">4限</option>
              <option value="5">5限</option>
              <option value="6">6限</option>
              <option value="7">7限</option>
            </select>
          </div>
        </div>
        <div class="form-row two-col">
          <div>
            <label class="form-label">単位数</label>
            <select id="input-credits" class="form-input">
              <option value="1">1単位</option>
              <option value="2">2単位</option>
              <option value="3">3単位</option>
              <option value="4">4単位</option>
            </select>
          </div>
          <div>
            <label class="form-label">種別</label>
            <select id="input-color" class="form-input">
              <option value="blue">履修登録（青）</option>
              <option value="green">メディア（緑）</option>
              <option value="red">仮参加（赤）</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label class="form-label">担当教員</label>
          <input type="text" id="input-teacher" class="form-input" placeholder="例：山下 充">
        </div>
        <div class="form-row">
          <label class="form-label">教室</label>
          <input type="text" id="input-room" class="form-input" placeholder="例：LS401">
        </div>
        <button class="btn-submit" id="btn-submit-course">追加する</button>
      </div>
    </div>
  </div>

  <!-- 課題追加モーダル -->
  <div class="modal-overlay" id="modal-add-task" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">課題を追加</h2>
        <button class="modal-close" id="modal-task-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">授業</label>
          <select id="input-task-course" class="form-input"></select>
        </div>
        <div class="form-row">
          <label class="form-label">課題名</label>
          <input type="text" id="input-task-title" class="form-input" placeholder="例：第2章レポート">
        </div>
        <div class="form-row">
          <label class="form-label">種別</label>
          <select id="input-task-type" class="form-input">
            <option value="report">レポート</option>
            <option value="quiz">小テスト</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div class="form-row two-col">
          <div>
            <label class="form-label">締切日</label>
            <input type="date" id="input-task-deadline" class="form-input">
          </div>
          <div>
            <label class="form-label">やる予定日</label>
            <input type="date" id="input-task-planned" class="form-input">
          </div>
        </div>
        <button class="btn-submit" id="btn-submit-task">追加する</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
